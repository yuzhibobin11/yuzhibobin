<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusFlow | 多智能体内容创作平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--bg-dark) 70%);
        }

        .dashboard {
            width: 900px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        /* 顶部装饰光效 */
        .dashboard::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        h1 {
            font-weight: 600;
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            font-size: 12px;
            background: rgba(139, 92, 246, 0.2);
            color: #c4b5fd;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* 输入区域 */
        .input-group {
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        /* 协作流程展示 */
        .workflow-container {
            margin-top: 40px;
            display: none; /* 初始隐藏 */
        }

        .agent-step {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.6s forwards;
        }

        .step-indicator {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .step-content {
            background: rgba(15, 23, 42, 0.4);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        .step-header {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .status-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .step-body {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.6;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        /* 模拟打字机光标 */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--primary);
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        /* 最终结果 */
        .final-result {
            margin-top: 32px;
            padding: 32px;
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.1) 0%, rgba(15, 23, 42, 0.4) 100%);
            border: 1px solid var(--primary);
            border-radius: 16px;
            animation: fadeIn 1s ease;
        }

        .final-result h3 {
            margin-top: 0;
            color: var(--primary);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <h1>NexusFlow <span class="badge">Beta v1.0</span></h1>
        <p class="subtitle">基于多智能体协作的深度内容自动化生产引擎</p>
    </header>

    <div class="input-group">
        <label for="topic">请输入创作主题</label>
        <input type="text" id="topic" placeholder="例如：Sora 对视频行业的影响..." value="Sora 对视频行业的影响">
    </div>

    <button onclick="startWorkflow()">启动创作工作流</button>

    <div id="workflow" class="workflow-container">
        <!-- Agent 步骤将在这里动态插入 -->
    </div>
</div>

<script>
    async function startWorkflow() {
        const btn = document.querySelector('button');
        const workflowContainer = document.getElementById('workflow');
        
        btn.disabled = true;
        btn.innerText = "工作流运行中...";
        btn.style.opacity = "0.7";
        
        workflowContainer.style.display = 'block';
        workflowContainer.innerHTML = ''; // 清空

        // 模拟数据流
        const steps = [
            {
                agent: "策划 Agent",
                icon: "🧠",
                action: "分析 RSS 源与热点趋势",
                log: "正在扫描 TechCrunch, HackerNews... 识别关键词: ['Sora', '生成式AI', '视频合成']... 生成大纲结构完成。"
            },
            {
                agent: "写作 Agent",
                icon: "✍️",
                action: "撰写初稿并调用搜索工具",
                log: "正在编写第1章节... 调用搜索API获取最新数据... 正在编写第3章节... 初稿字数: 3200字。"
            },
            {
                agent: "评审 Agent",
                icon: "👁️",
                action: "逻辑审查与风格润色",
                log: "检测到第2段落逻辑不够紧密... 建议增加对比数据... 风格调整为'深度分析'... 审核通过。"
            }
        ];

        for (let i = 0; i < steps.length; i++) {
            await simulateStep(steps[i], i);
        }

        // 显示最终结果
        setTimeout(() => {
            const resultDiv = document.createElement('div');
            resultDiv.className = 'final-result';
            resultDiv.innerHTML = `
                <h3>✅ 创作完成</h3>
                <p>文章《Sora：视频行业的颠覆者还是辅助者？》已生成。</p>
                <div style="font-size: 12px; color: var(--text-dim); margin-top: 10px;">
                    总耗时: 14.2s | Token消耗: 4,200 | 质量评分: 9.2/10
                </div>
            `;
            workflowContainer.appendChild(resultDiv);
            btn.disabled = false;
            btn.innerText = "重新开始";
            btn.style.opacity = "1";
        }, 500);
    }

    function simulateStep(data, index) {
        return new Promise(resolve => {
            const stepDiv = document.createElement('div');
            stepDiv.className = 'agent-step';
            stepDiv.style.animationDelay = `${index * 0.2}s`;

            stepDiv.innerHTML = `
                <div class="step-indicator" style="background: rgba(59, 130, 246, 0.1); color: var(--primary); border-color: var(--primary);">
                    ${data.icon}
                </div>
                <div class="step-content">
                    <div class="step-header">
                        <span>${data.agent}</span>
                        <span class="status-tag">运行中</span>
                    </div>
                    <div class="step-body" id="log-${index}"></div>
                </div>
            `;

            document.getElementById('workflow').appendChild(stepDiv);

            // 模拟打字机效果
            const logElement = document.getElementById(`log-${index}`);
            let i = 0;
            const text = data.log;
            
            const timer = setInterval(() => {
                if (i < text.length) {
                    logElement.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
                    i++;
                } else {
                    clearInterval(timer);
                    logElement.innerHTML = text; // 移除光标
                    resolve();
                }
            }, 30 + Math.random() * 30); // 随机打字速度
        });
    }
</script>

</body>
</html>
